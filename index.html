<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在线求签</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #8B0000;
            --secondary-color: #D4A574;
            --bg-color: #8B0000;
            --text-color: #2C1810;
            --gold-color: #FFD700;
            --red-color: #E60012;
            --light-gold: #FFED4E;
            --dark-red: #6B0000;
            --curtain-red: #8B0000;
        }

        body {
            font-family: 'STKaiti', 'KaiTi', 'SimSun', serif;
            background: var(--curtain-red);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-color);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at center, rgba(255, 215, 0, 0.3) 0%, transparent 70%),
                radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300"><path d="M0,200 Q300,150 600,200 T1200,200 L1200,300 L0,300 Z" fill="rgba(255, 215, 0, 0.2)"/><path d="M0,250 Q400,200 800,250 T1200,250 L1200,300 L0,300 Z" fill="rgba(255, 215, 0, 0.1)"/></svg>');
            background-size: cover;
            animation: breathe 4s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scaleY(1); }
            50% { opacity: 0.5; transform: scaleY(1.05); }
        }

        .curtain-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(180deg, var(--dark-red), var(--curtain-red));
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .curtain-fold {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: repeating-linear-gradient(
                90deg,
                rgba(0,0,0,0.1) 0px,
                rgba(0,0,0,0.1) 20px,
                transparent 20px,
                transparent 40px
            );
        }

        .star-corner {
            position: fixed;
            width: 30px;
            height: 30px;
            background: var(--gold-color);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            pointer-events: none;
            animation: twinkle 3s ease-in-out infinite;
        }

        .star-corner.top-left {
            top: 20px;
            left: 20px;
        }

        .star-corner.top-right {
            top: 20px;
            right: 20px;
        }

        .star-corner.bottom-left {
            bottom: 20px;
            left: 20px;
        }

        .star-corner.bottom-right {
            bottom: 20px;
            right: 20px;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .title {
            font-size: 3rem;
            color: var(--gold-color);
            margin-bottom: 50px;
            text-shadow: 
                2px 2px 4px rgba(0,0,0,0.5),
                0 0 15px rgba(255, 215, 0, 0.5);
            letter-spacing: 12px;
            font-weight: bold;
            text-align: center;
            padding: 15px 30px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
            border-radius: 25px;
            border: 3px solid var(--gold-color);
            box-shadow: 
                0 8px 25px rgba(0,0,0,0.4),
                0 0 30px rgba(255, 215, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 15px;
        }

        .stage-a {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .stage-a.hidden {
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        .qian-tong {
            width: 160px;
            height: 200px;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s ease;
            z-index: 10;
        }

        .qian-tong::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 200px;
            background: linear-gradient(135deg, #E60012 0%, #C00010 50%, #E60012 100%);
            clip-path: polygon(
                20% 0%, 80% 0%, 100% 20%, 100% 80%, 
                80% 100%, 20% 100%, 0% 80%, 0% 20%
            );
            box-shadow: 
                inset -8px -8px 20px rgba(0,0,0,0.5),
                inset 8px 8px 20px rgba(255,255,255,0.15),
                0 20px 40px rgba(0,0,0,0.6),
                0 0 30px rgba(255, 215, 0, 0.4);
            border: 3px solid var(--gold-color);
        }

        .qian-tong::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--gold-color), var(--light-gold));
            clip-path: polygon(
                25% 0%, 75% 0%, 100% 25%, 100% 75%, 
                75% 100%, 25% 100%, 0% 75%, 0% 25%
            );
            box-shadow: 
                inset 3px 3px 8px rgba(255,255,255,0.4),
                inset -3px -3px 8px rgba(0,0,0,0.3),
                0 4px 12px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
            content: '摇';
        }

        .qian-sticks {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
        }

        .stick {
            width: 8px;
            height: 60px;
            background: linear-gradient(90deg, #DEB887, #D2B48C, #DEB887);
            border-radius: 2px 2px 0 0;
            transform-origin: bottom center;
            box-shadow: 
                1px 0 3px rgba(0,0,0,0.2),
                inset 1px 0 2px rgba(255,255,255,0.3);
            position: relative;
        }

        .stick::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                rgba(255, 215, 0, 0.1) 1px,
                transparent 2px
            );
            pointer-events: none;
        }

        .stick:nth-child(1) { transform: rotate(-8deg); height: 55px; }
        .stick:nth-child(2) { transform: rotate(-4deg); height: 62px; }
        .stick:nth-child(3) { transform: rotate(0deg); height: 58px; }
        .stick:nth-child(4) { transform: rotate(4deg); height: 65px; }
        .stick:nth-child(5) { transform: rotate(8deg); height: 52px; }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(-5deg); }
            20% { transform: rotate(5deg); }
            30% { transform: rotate(-5deg); }
            40% { transform: rotate(5deg); }
            50% { transform: rotate(-3deg); }
            60% { transform: rotate(3deg); }
            70% { transform: rotate(-2deg); }
            80% { transform: rotate(2deg); }
            90% { transform: rotate(-1deg); }
        }

        .qian-tong.shaking {
            animation: shake 1s ease-in-out;
        }

        .hint {
            margin-top: 30px;
            color: var(--primary-color);
            font-size: 0.9rem;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        .stage-b {
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .stage-b.active {
            display: flex;
            opacity: 1;
        }

        @keyframes flyOut {
            0% {
                transform: translateY(0) scale(0.3);
                opacity: 0;
            }
            50% {
                transform: translateY(-100px) scale(0.6);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px) scale(1);
                opacity: 1;
            }
        }

        .qian-paper {
            width: 70px;
            height: 300px;
            background: linear-gradient(90deg, #DEB887 0%, #D2B48C 50%, #DEB887 100%);
            border: 2px solid var(--gold-color);
            border-radius: 8px 8px 2px 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            box-shadow: 
                3px 0 10px rgba(0,0,0,0.3),
                inset 1px 0 3px rgba(255,255,255,0.4),
                inset -1px 0 3px rgba(0,0,0,0.2);
            animation: flyOut 0.8s ease-out forwards;
            position: relative;
            transform-origin: top center;
        }

        .qian-paper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                rgba(255, 215, 0, 0.1) 1px,
                transparent 2px
            );
            pointer-events: none;
        }

        .qian-paper::after {
            content: '灵';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, var(--primary-color), #C00010);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold-color);
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 
                inset 2px 2px 5px rgba(255,255,255,0.2),
                inset -2px -2px 5px rgba(0,0,0,0.3),
                0 2px 8px rgba(0,0,0,0.3);
        }

        .qian-id {
            writing-mode: vertical-rl;
            font-size: 1.1rem;
            color: var(--primary-color);
            font-weight: bold;
            letter-spacing: 4px;
            margin-top: 50px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
            text-decoration: underline;
            text-decoration-color: rgba(139, 0, 0, 0.3);
        }

        .qian-luck {
            writing-mode: vertical-rl;
            font-size: 1.3rem;
            color: var(--primary-color);
            font-weight: bold;
            letter-spacing: 6px;
            margin-top: 15px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
        }

        .qian-story {
            writing-mode: vertical-rl;
            font-size: 0.9rem;
            color: var(--primary-color);
            letter-spacing: 3px;
            margin-top: 15px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
        }

        .stage-c {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        .stage-c.active {
            display: flex;
            opacity: 1;
        }

        .result-card {
            width: 100%;
            background: linear-gradient(135deg, #E60012 0%, #C00010 50%, #E60012 100%);
            border: 4px solid var(--gold-color);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 
                0 15px 45px rgba(230, 0, 18, 0.5),
                0 0 30px rgba(255, 215, 0, 0.4);
        }

        .result-header {
            text-align: center;
            border-bottom: 2px dashed var(--gold-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .result-id {
            font-size: 1.5rem;
            color: var(--gold-color);
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .result-luck {
            font-size: 2rem;
            color: var(--gold-color);
            font-weight: bold;
            letter-spacing: 8px;
            margin: 10px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        .result-story {
            font-size: 1.1rem;
            color: #FFF8F0;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .result-section {
            margin: 15px 0;
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--gold-color);
            opacity: 0.9;
            margin-bottom: 5px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .result-content {
            font-size: 1.1rem;
            color: #FFF8F0;
            line-height: 1.8;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .result-poem {
            font-size: 1.2rem;
            color: var(--gold-color);
            text-align: center;
            line-height: 2;
            letter-spacing: 3px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid var(--gold-color);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .restart-btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: linear-gradient(135deg, var(--primary-color), #A0522D);
            color: #FFF8DC;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        .restart-btn:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.3);
        }

        .decoration {
            position: fixed;
            font-size: 3rem;
            opacity: 0.1;
            color: var(--primary-color);
            pointer-events: none;
        }

        .star {
            position: fixed;
            background: var(--gold-color);
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .shine {
            position: fixed;
            background: linear-gradient(45deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            pointer-events: none;
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }

        .decoration.top-left {
            top: 20px;
            left: 20px;
        }

        .decoration.top-right {
            top: 20px;
            right: 20px;
        }

        .decoration.bottom-left {
            bottom: 20px;
            left: 20px;
        }

        .decoration.bottom-right {
            bottom: 20px;
            right: 20px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.5s ease forwards;
        }

        .loading-dots {
            display: inline-flex;
            gap: 5px;
            margin-top: 20px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="curtain-top">
        <div class="curtain-fold"></div>
    </div>
    
    <div class="star-corner top-left"></div>
    <div class="star-corner top-right"></div>
    <div class="star-corner bottom-left"></div>
    <div class="star-corner bottom-right"></div>

    <div class="container">
        <h1 class="title">灵签问卜</h1>

        <div class="stage-a" id="stageA">
            <div class="qian-tong" id="qianTong">
                <div class="qian-sticks">
                    <div class="stick"></div>
                    <div class="stick"></div>
                    <div class="stick"></div>
                    <div class="stick"></div>
                    <div class="stick"></div>
                </div>
            </div>
            <p class="hint">点击签筒或摇动手机求签</p>
        </div>

        <div class="stage-b" id="stageB">
            <div class="qian-paper" id="qianPaper">
                <div class="qian-id" id="qianId"></div>
                <div class="qian-luck" id="qianLuck"></div>
                <div class="qian-story" id="qianStory"></div>
            </div>
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="stage-c" id="stageC">
            <div class="result-card">
                <div class="result-header">
                    <div class="result-id" id="resultId"></div>
                    <div class="result-luck" id="resultLuck"></div>
                    <div class="result-story" id="resultStory"></div>
                </div>
                <div class="result-section">
                    <div class="result-label">核心诗意</div>
                    <div class="result-poem" id="resultPoem"></div>
                </div>
                <div class="result-section">
                    <div class="result-label">寓意概要</div>
                    <div class="result-content" id="resultSummary"></div>
                </div>
                <div class="result-section">
                    <div class="result-label">解签建议</div>
                    <div class="result-content" id="resultAdvice"></div>
                </div>
            </div>
            <button class="restart-btn" id="restartBtn">再求一签</button>
        </div>
    </div>

    <script>
        // API 配置 - 默认使用本地数据，可通过 localStorage 配置后端API
        const API_BASE_URL = localStorage.getItem('qianApiUrl') || '';
        
        // 本地默认数据（作为备用）
        const defaultQianData = [
            {
                id: "第十八签",
                luck: "大吉",
                story: "管鲍之交",
                poem: "金鳞岂是池中物，一遇风云便化龙。",
                summary: "此卦鱼化为龙之象，凡事进取大吉也。",
                advice: "宜把握时机，不宜墨守成规。贵人相助，前程似锦。"
            },
            {
                id: "第七签",
                luck: "上吉",
                story: "苏武牧羊",
                poem: "风霜历尽志不移，终见汉使到来时。",
                summary: "此卦守正待时之象，凡事忍耐终吉。",
                advice: "宜坚守本心，静待时机。莫急莫躁，自有转机。"
            },
            {
                id: "第二十三签",
                luck: "中吉",
                story: "孟母三迁",
                poem: "良禽择木而栖身，近朱者赤近墨黑。",
                summary: "此卦择善而从之象，凡事审慎为宜。",
                advice: "宜择善而交，远离是非。环境重要，慎选其处。"
            },
            {
                id: "第四十二签",
                luck: "下吉",
                story: "塞翁失马",
                poem: "祸福相依难预料，失马未必是灾殃。",
                summary: "此卦祸福相倚之象，凡事顺其自然。",
                advice: "宜平常心看待得失，塞翁失马焉知非福。保持乐观，转机将至。"
            },
            {
                id: "第五十六签",
                luck: "上上",
                story: "鲤鱼跃龙门",
                poem: "十年寒窗无人问，一举成名天下知。",
                summary: "此卦功成名就之象，凡事努力必成。",
                advice: "宜奋发图强，莫负韶华。厚积薄发，终成大器。"
            },
            {
                id: "第三十一签",
                luck: "中平",
                story: "守株待兔",
                poem: "刻舟求剑终成空，守株待兔亦徒劳。",
                summary: "此卦因循守旧之象，凡事主动为宜。",
                advice: "宜主动出击，不宜坐等。机会难得，把握当下。"
            },
            {
                id: "第八十八签",
                luck: "大吉",
                story: "龙凤呈祥",
                poem: "龙飞凤舞祥云绕，喜气盈门福自来。",
                summary: "此卦吉祥如意之象，凡事顺遂大吉。",
                advice: "宜积极进取，把握良机。贵人相助，诸事顺遂。"
            }
        ];
        
        let qianData = [...defaultQianData];
        let useLocalData = true;

        const stageA = document.getElementById('stageA');
        const stageB = document.getElementById('stageB');
        const stageC = document.getElementById('stageC');
        const qianTong = document.getElementById('qianTong');
        const qianPaper = document.getElementById('qianPaper');
        const restartBtn = document.getElementById('restartBtn');

        let isShaking = false;
        let currentQian = null;
        let lastShakeTime = 0;

        // 从后端API获取随机签文
        async function getRandomQian() {
            if (API_BASE_URL && !useLocalData) {
                try {
                    const response = await fetch(`${API_BASE_URL}/random`);
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (error) {
                    console.log('API请求失败，使用本地数据');
                }
            }
            // 使用本地数据
            const randomIndex = Math.floor(Math.random() * qianData.length);
            return qianData[randomIndex];
        }
        
        // 加载所有签文数据
        async function loadQianData() {
            if (!API_BASE_URL) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/qian?limit=1000`);
                if (response.ok) {
                    const result = await response.json();
                    if (result.data && result.data.length > 0) {
                        qianData = result.data;
                        useLocalData = false;
                        console.log('已从后端加载', qianData.length, '条签文');
                    }
                }
            } catch (error) {
                console.log('无法连接后端，使用本地数据');
            }
        }

        function showStageB(qian) {
            stageA.classList.add('hidden');
            
            document.getElementById('qianId').textContent = qian.id;
            document.getElementById('qianLuck').textContent = qian.luck;
            document.getElementById('qianStory').textContent = qian.story;
            
            stageB.classList.add('active');
            
            setTimeout(() => {
                showStageC(qian);
            }, 3000);
        }

        function showStageC(qian) {
            stageB.classList.remove('active');
            
            document.getElementById('resultId').textContent = qian.id;
            document.getElementById('resultLuck').textContent = qian.luck;
            document.getElementById('resultStory').textContent = '典故：' + qian.story;
            document.getElementById('resultPoem').textContent = qian.poem;
            document.getElementById('resultSummary').textContent = qian.summary;
            document.getElementById('resultAdvice').textContent = qian.advice;
            
            stageC.classList.add('active');
            
            const sections = stageC.querySelectorAll('.result-section');
            sections.forEach((section, index) => {
                section.style.opacity = '0';
                section.style.animation = `fadeInUp 0.5s ease ${0.3 + index * 0.2}s forwards`;
            });
        }

        function resetToStageA() {
            stageC.classList.remove('active');
            stageB.classList.remove('active');
            stageA.classList.remove('hidden');
            
            qianPaper.style.animation = 'none';
            qianPaper.offsetHeight;
            qianPaper.style.animation = '';
            
            currentQian = null;
        }

        qianTong.addEventListener('click', startQianQiu);
        restartBtn.addEventListener('click', resetToStageA);

        let lastX = 0, lastY = 0, lastZ = 0;
        let shakeThreshold = 15;

        function handleDeviceMotion(event) {
            const acceleration = event.accelerationIncludingGravity;
            if (!acceleration) return;
            
            const x = acceleration.x || 0;
            const y = acceleration.y || 0;
            const z = acceleration.z || 0;
            
            const deltaX = Math.abs(x - lastX);
            const deltaY = Math.abs(y - lastY);
            const deltaZ = Math.abs(z - lastZ);
            
            if (deltaX + deltaY + deltaZ > shakeThreshold) {
                const now = Date.now();
                if (now - lastShakeTime > 2000) {
                    lastShakeTime = now;
                    startQianQiu();
                }
            }
            
            lastX = x;
            lastY = y;
            lastZ = z;
        }

        if (window.DeviceMotionEvent) {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                document.body.addEventListener('click', function requestPermission() {
                    DeviceMotionEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('devicemotion', handleDeviceMotion);
                            }
                        })
                        .catch(console.error);
                    document.body.removeEventListener('click', requestPermission);
                }, { once: true });
            } else {
                window.addEventListener('devicemotion', handleDeviceMotion);
            }
        }

        function createStars() {
            for (let i = 0; i < 20; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(star);
            }
        }

        function createShine() {
            const shine = document.createElement('div');
            shine.className = 'shine';
            shine.style.left = Math.random() * 100 + '%';
            shine.style.top = Math.random() * 100 + '%';
            shine.style.width = '100px';
            shine.style.height = '100px';
            shine.style.borderRadius = '50%';
            shine.style.animationDelay = Math.random() * 3 + 's';
            document.body.appendChild(shine);
            
            setTimeout(() => {
                shine.remove();
            }, 3000);
        }

        async function startQianQiu() {
            if (isShaking) return;
            
            isShaking = true;
            qianTong.classList.add('shaking');
            
            // 创建闪光效果
            for (let i = 0; i < 5; i++) {
                setTimeout(createShine, i * 200);
            }
            
            // 异步获取签文
            currentQian = await getRandomQian();
            
            setTimeout(() => {
                qianTong.classList.remove('shaking');
                isShaking = false;
                showStageB(currentQian);
            }, 1000);
        }

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // 初始化星星
        createStars();
        
        // 页面加载时尝试从后端加载数据
        loadQianData();
    </script>
</body>
</html>
